<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spacehouse — Business Tools</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Instrument Sans', system-ui, sans-serif;
  background: #0f0f0e;
  color: #f0ede8;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

.wrap { width: 100%; max-width: 520px; }

.brand { text-align: center; margin-bottom: 48px; }

.brand-name {
  font-family: 'Instrument Serif', Georgia, serif;
  font-size: 52px;
  font-style: italic;
  letter-spacing: -1px;
  color: #f0ede8;
}

.brand-tagline {
  font-size: 12px;
  color: #5c5a55;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 8px;
}

.tools { display: flex; flex-direction: column; gap: 12px; }

.tool-card {
  background: #191917;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  text-decoration: none;
  color: inherit;
  transition: all 0.15s;
}

.tool-card:hover {
  background: #222220;
  border-color: rgba(255,255,255,0.16);
  transform: translateY(-1px);
}

.tool-icon {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.tool-icon-crm { background: rgba(91,142,240,0.15); color: #5b8ef0; }
.tool-icon-tasks { background: rgba(212,168,83,0.15); color: #d4a853; }

.tool-info { flex: 1; }

.tool-name {
  font-size: 17px;
  font-weight: 500;
  color: #f0ede8;
  margin-bottom: 4px;
}

.tool-desc {
  font-size: 13px;
  color: #5c5a55;
  line-height: 1.5;
}

.tool-arrow {
  font-size: 20px;
  color: #3a3936;
  transition: all 0.15s;
}

.tool-card:hover .tool-arrow {
  transform: translateX(4px);
  color: #9e9a92;
}

.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 11px;
  color: #3a3936;
  letter-spacing: 0.06em;
}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-name">Spacehouse</div>
    <div class="brand-tagline">Business Tools</div>
  </div>

  <div class="tools">
    <a class="tool-card" href="spacehouse_crm.html">
      <div class="tool-icon tool-icon-crm">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 20c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="15" y="14" width="7" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
          <path d="M17 16.5h3M17 18h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">CRM</div>
        <div class="tool-desc">Contacts, leads, clients, projects, time tracking &amp; Gantt</div>
      </div>
      <div class="tool-arrow">→</div>
    </a>

    <a class="tool-card" href="spacehouse_tasks.html">
      <div class="tool-icon tool-icon-tasks">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="3" y="3" width="18" height="18" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 12l3 3 5-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="tool-info">
        <div class="tool-name">Task Scheduler</div>
        <div class="tool-desc">Daily tasks, week view, process tracking &amp; follow-ups</div>
      </div>
      <div class="tool-arrow">→</div>
    </a>
  </div>

  <div class="footer">Spacehouse &mdash; built for the way you work</div>
</div>

</body>
</html>
